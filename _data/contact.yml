- heading: "Everything's fair game"
  text: "I default to open. That goes for code, ideas, and conversations. What are you working on?"
- heading: "The first draft is fine"
  text: "Ship, then improve. That goes for messages too. Don't overthink it. Just hit send."
- heading: "Someone has to go first"
  text: "Every good rally starts with someone willing to hit first. Your serve."
- heading: "From thought to action"
  text: "Strategy without execution is just a thought. Reaching out is execution. Go."
- heading: "You don't need the answer yet"
  text: "I have a lot of respect for people who are in the middle of figuring it out. If that's you, I'm here."
