name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
        env:
          BUNDLE_WITH: test

      - name: Build site
        run: bundle exec jekyll build

      - name: Validate HTML
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external \
            --ignore-urls "/^#/" \
            --no-enforce-https

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: _site
          path: ./_site

  accessibility:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: _site
          path: ./_site

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run WCAG 2.1 AA audit
        run: |
          npm install -g pa11y-ci serve
          serve ./_site -l 5000 &
          sleep 3
          URLS=$(find ./_site -name '*.html' -not -path './_site/404.html' \
            | sed 's|^./_site|http://localhost:5000|' \
            | sed 's|/index\.html$|/|')
          echo "$URLS" | xargs pa11y-ci

  lighthouse:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: _site
          path: ./_site

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Lighthouse audit
        run: |
          npm install -g @lhci/cli serve
          serve ./_site -l 5000 &
          sleep 3
          lhci autorun \
            --collect.url=http://localhost:5000/ \
            --collect.url=http://localhost:5000/blog/ \
            --collect.url=http://localhost:5000/contact/ \
            --collect.url=http://localhost:5000/principles.html \
            --collect.settings.chromeFlags="--no-sandbox" \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.uses-long-cache-ttl=off \
            --assert.assertions.redirects-http=off \
            --assert.assertions.uses-http2=off \
            --assert.assertions.canonical=off \
            --assert.assertions.robots-txt=off \
            --assert.assertions.errors-in-console=off \
            --assert.assertions.unused-javascript=off \
            --assert.assertions.network-dependency-tree-insight=off \
            --assert.assertions.color-contrast=off \
            --assert.assertions.document-latency-insight=off \
            --assert.assertions.redirects=off \
            --upload.target=temporary-public-storage

  image-size-check:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: _site
          path: ./_site

      - name: Verify no oversized images
        run: |
          oversized=$(find ./_site -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" \) -size +200k)
          if [ -n "$oversized" ]; then
            echo "ERROR: Images over 200KB found:"
            echo "$oversized" | while read f; do
              echo "  $(du -h "$f" | cut -f1)  $f"
            done
            exit 1
          fi
          echo "All images under 200KB"
